name: CI/CD Pipeline

on:
  push:
    branches: [ main ]

env:
  DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
  DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Debug - Check Secrets
      run: |
        echo "🔍 Checking Docker secrets..."
        echo "Username: ${{ secrets.DOCKER_USERNAME }}"
        echo "Password length: ${{ secrets.DOCKER_PASSWORD }}"
        if [ -n "${{ secrets.DOCKER_PASSWORD }}" ]; then
          echo "✅ Password is set!"
        else
          echo "❌ Password is NOT set!"
        fi
    
    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
    
    - name: Debug - Docker Login Status
      run: |
        echo "🔍 Checking Docker login status..."
        docker info | grep "Username"
    
    - name: Build and Push Backend
      run: |
        echo "🔨 Building backend image..."
        cd backend
        docker build -t $DOCKER_USERNAME/task-backend:latest .
        echo "📤 Pushing backend image..."
        docker push $DOCKER_USERNAME/task-backend:latest
    
    - name: Build and Push Frontend
      run: |
        echo "🔨 Building frontend image..."
        cd frontend
        docker build -t $DOCKER_USERNAME/task-frontend:latest .
        echo "📤 Pushing frontend image..."
        docker push $DOCKER_USERNAME/task-frontend:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
    - name: Deploy to Server
      run: echo "✅ Deployment successful!"
