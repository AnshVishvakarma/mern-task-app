name: Test Docker Login

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Debug Secrets
        env:
          USERNAME: ${{ secrets.DOCKER_USERNAME }}
          TOKEN: ${{ secrets.DOCKER_PASSWORD }}
        run: |
          echo "========== DEBUG =========="
          echo "Username: [$USERNAME]"
          echo "Username Length: ${#USERNAME}"
          echo "Token Length: ${#TOKEN}"
          echo "First Bytes (hex):"
          printf "%s" "$TOKEN" | od -An -tx1 | head
          echo "==========================="

      - name: Docker Login
        env:
          USERNAME: ${{ secrets.DOCKER_USERNAME }}
          TOKEN: ${{ secrets.DOCKER_PASSWORD }}
        run: |
          echo "$TOKEN" | docker login docker.io \
            --username "$USERNAME" \
            --password-stdin

      - name: Docker Info
        run: docker info

      - name: Build Backend
        run: |
          cd backend
          docker build -t test-backend .

      - name: Build Frontend
        run: |
          cd frontend
          docker build -t test-frontend .
