name: CI/CD Pipeline

on:
  push:
    branches: [ main ]

env:
  DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
  DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: false
    
    - name: Encode Docker token (Base64)
      run: |
        echo "🔐 Encoding Docker token..."
        echo -n "${{ secrets.DOCKER_PASSWORD }}" | base64 > /tmp/token_base64
    
    - name: Login to Docker Hub
      run: |
        echo "🔐 Logging in to Docker Hub..."
        cat /tmp/token_base64 | base64 -d | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
    
    - name: Build and Push Backend
      run: |
        cd backend
        docker build -t "${{ secrets.DOCKER_USERNAME }}/task-backend:latest" .
        docker push "${{ secrets.DOCKER_USERNAME }}/task-backend:latest"
    
    - name: Build and Push Frontend
      run: |
        cd frontend
        docker build -t "${{ secrets.DOCKER_USERNAME }}/task-frontend:latest" .
        docker push "${{ secrets.DOCKER_USERNAME }}/task-frontend:latest"

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
    - name: Deploy to Server
      run: echo "✅ Deployment successful!"
